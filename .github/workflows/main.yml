name: OtoFon Dinamik Analiz v3.1

on:
  push:
    branches:
      - main
      - ana
  schedule:
    - cron: '15 8 * * 1-5'  # Hafta içi 11:15 TSİ
  workflow_dispatch:

jobs:
  tarama_ve_analiz:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Kopyala
        uses: actions/checkout@v4

      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Bağımlılıkları Yükle
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Kod Kalitesini Kontrol Et
        run: ruff check . --output-format=github || echo "Devam ediliyor..."
        continue-on-error: true

      - name: Tarama + Trend Analizi + Fonaliz
        run: python -u ytarama_script.py weekly 2

      - name: Sonuclari Kaydet (Artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: otofon-raporu-${{ github.run_id }}
          path: |
            *.xlsx
            *.txt
